name: "Dagger CI"
on:
  push:

jobs:
  dagger:
    name: Dagger Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dagger CI
        uses: dagger/dagger-for-github@8.0.0
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Build rust client
        run: create-client rust rs | export clients/rs
        shell: dagger {0}
      - name: Build ts-axios client
        run: create-client typescript-axios ts-axios | export clients/ts-axios
        shell: dagger {0}
      - name: CI
        run: ci
        shell: dagger {0}